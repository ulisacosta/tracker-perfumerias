name: Check perfume prices

on:
  schedule:
    # Corre cada 2 horas. Cambiar el cron si querés otra frecuencia.
    # https://crontab.guru/ te ayuda a armar el horario.
    - cron: "0 */2 * * *"
  workflow_dispatch: {}  # te deja correrlo a mano desde la pestaña "Actions" en GitHub

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run price tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python price_tracker.py

      - name: Generate HTML report
        run: python generate_report.py

      - name: Save updated price history and report
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add price_history.json index.html
          git diff --staged --quiet || git commit -m "Update price history and report"
          git push